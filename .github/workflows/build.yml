name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build firmware (nRF54LM20DK + nRF7002EB2 sQSPI)
    runs-on: ubuntu-24.04
    # Use the pre-built NCS v3.3.0 toolchain container — no nrfutil download needed.
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    # The container sets up west/cmake/ninja in PATH for bash sessions only.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: workspace/nordic-wifi-shell-sqspi

      # Cache the NCS repos to avoid full re-clone on every run.
      # Key includes the patch files so a patch change invalidates the cache.
      - name: Cache NCS workspace
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            workspace/nrf
            workspace/zephyr
            workspace/modules
            workspace/nrfxlib
            workspace/bootloader
          key: ncs-v3.3.0-${{ hashFiles('workspace/nordic-wifi-shell-sqspi/west.yml', 'workspace/nordic-wifi-shell-sqspi/patches/**') }}

      - name: Init NCS v3.3.0 workspace
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        working-directory: workspace
        run: |
          git config --global --add safe.directory '*'
          west init -l nordic-wifi-shell-sqspi
          # Disable groups for optional external repos that fail SHA fetches in CI
          # and are not needed for the wifi-shell build.
          # Use west config instead of --group-filter flag: values starting with '-'
          # are misinterpreted by argparse as new flags even with separate invocations.
          west config manifest.group-filter -- -ci-skip,-benchmark
          west update -o=--depth=1 -n

      # When restoring from cache the .west config is missing; re-run init (no-op if already there).
      - name: Restore west config after cache hit
        if: steps.cache-ncs.outputs.cache-hit == 'true'
        working-directory: workspace
        run: |
          git config --global --add safe.directory '*'
          west init -l nordic-wifi-shell-sqspi 2>/dev/null || true

      # Apply patches to nrfxlib, nrf, and zephyr on top of their v3.3.0 tags.
      # Skips gracefully if a patch is already applied (cache hit scenario).
      - name: Apply upstream patches
        working-directory: workspace
        run: |
          git config --global --add safe.directory '*'
          PATCHES="$(pwd)/nordic-wifi-shell-sqspi/patches"

          apply_if_needed() {
            local repo="$1"
            local patch="$2"
            if git -C "$repo" am --check "$patch" 2>/dev/null; then
              echo "Applying patch to $repo..."
              git -C "$repo" am "$patch"
            else
              echo "Patch already applied or not applicable for $repo — skipping"
            fi
          }

          apply_if_needed nrfxlib "$PATCHES/nrfxlib/"0001-*.patch
          apply_if_needed nrf     "$PATCHES/nrf/"0001-*.patch
          apply_if_needed zephyr  "$PATCHES/zephyr/"0001-*.patch

      - name: Build
        working-directory: workspace/nordic-wifi-shell-sqspi
        run: |
          west build \
            -b nrf54lm20dk/nrf54lm20a/cpuapp \
            -p \
            -d build \
            . \
            -- -DSHIELD=nrf7002eb2_mspi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          HEX="workspace/nordic-wifi-shell-sqspi/build/merged.hex"
          if [ ! -f "$HEX" ]; then
            HEX="workspace/nordic-wifi-shell-sqspi/build/nordic-wifi-shell-sqspi/zephyr/zephyr.hex"
          fi
          if [ ! -f "$HEX" ]; then
            HEX="workspace/nordic-wifi-shell-sqspi/build/zephyr/zephyr.hex"
          fi
          cp "$HEX" artifacts/merged.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf54lm20dk-sqspi
          path: artifacts/
          retention-days: 30

      # On every push to main: update the rolling "latest" release with fresh firmware.
      # softprops/action-gh-release creates the tag+release if absent, updates it if present.
      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: false
          make_latest: true
          files: artifacts/merged.hex
          body: |
            ## nRF54LM20DK + nRF7002 EB-II (sQSPI) — Latest pre-built firmware

            Auto-updated on every push to `main`.
            **Commit:** `${{ github.sha }}`

            ### Flash instructions

            1. Download `merged.hex`
            2. Open **nRF Connect for Desktop → Programmer**, select the DK, add the `.hex`, click **Erase & Write**

            Or via command line:
            ```sh
            west flash -d nordic-wifi-shell-sqspi/build --recover --dev-id <SERIAL>
            ```

            ### Connect

            Open **VCOM0** (115200 baud, hardware flow control ON).
            See [README.md](README.md) for hardware modification and Wi-Fi connection instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
