name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build firmware (nRF54LM20DK + nRF7002EB2 sQSPI)
    runs-on: ubuntu-latest

    steps:
      - name: Install nrfutil
        run: |
          curl -sSfL https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/executables/x86_64-unknown-linux-gnu/latest/nrfutil \
            -o /usr/local/bin/nrfutil
          chmod +x /usr/local/bin/nrfutil
          nrfutil self-upgrade || true

      - name: Install sdk-manager
        run: nrfutil install sdk-manager

      - name: Install NCS toolchain v3.3.0
        run: nrfutil sdk-manager toolchain install --ncs-version v3.3.0

      # west init uses this repo as the manifest source so it checks out the
      # app at /ncs/nordic-wifi-shell-sqspi together with all NCS deps.
      - name: Initialise NCS v3.3.0 workspace
        run: |
          nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
            west init \
              -m https://github.com/${{ github.repository }}.git \
              --mr ${{ github.sha }} \
              /ncs
          nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
            sh -c "cd /ncs && west update"

      # Apply the three format-patch files that ship with the app.
      # Each patch sits in patches/<repo>/ and is applied on top of the
      # corresponding v3.3.0 tag that west already checked out.
      - name: Apply upstream patches
        working-directory: /ncs
        run: |
          PATCHES="nordic-wifi-shell-sqspi/patches"

          git -C nrfxlib am \
            "$(pwd)/$PATCHES/nrfxlib/"0001-*.patch

          git -C nrf am \
            "$(pwd)/$PATCHES/nrf/"0001-*.patch

          git -C zephyr am \
            "$(pwd)/$PATCHES/zephyr/"0001-*.patch

      - name: Build
        working-directory: /ncs
        run: |
          nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
            west build \
              -b nrf54lm20dk/nrf54lm20a/cpuapp \
              -p \
              -d nordic-wifi-shell-sqspi/build \
              nordic-wifi-shell-sqspi \
              -- -DSHIELD=nrf7002eb2_mspi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp /ncs/nordic-wifi-shell-sqspi/build/merged.hex artifacts/
          cp /ncs/nordic-wifi-shell-sqspi/build/nordic-wifi-shell-sqspi/zephyr/zephyr.elf artifacts/ || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf54lm20dk-sqspi
          path: artifacts/
          retention-days: 30

      - name: Create GitHub release and attach firmware
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/merged.hex
          body: |
            ## nRF54LM20DK + nRF7002 EB-II (sQSPI) — ${{ github.ref_name }}

            Flash `merged.hex` with **nRF Connect for Desktop → Programmer** or:

            ```sh
            west flash -d nordic-wifi-shell-sqspi/build --recover --dev-id <SERIAL>
            ```

            See [README.md](README.md) for hardware modification and patching instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
