name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build firmware (nRF54LM20DK + nRF7002EB2 sQSPI)
    runs-on: ubuntu-24.04
    # Use the pre-built NCS v3.3.0 toolchain container — no nrfutil download needed.
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.3.0
    # The container sets up west/cmake/ninja in PATH for bash sessions only.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: workspace/nordic-wifi-shell-sqspi

      # Cache the NCS repos to avoid full re-clone on every run.
      # Key includes the patch files so a patch change invalidates the cache.
      - name: Cache NCS workspace
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            workspace/nrf
            workspace/zephyr
            workspace/modules
            workspace/nrfxlib
            workspace/bootloader
          key: ncs-v3.3.0-${{ hashFiles('workspace/nordic-wifi-shell-sqspi/west.yml', 'workspace/nordic-wifi-shell-sqspi/patches/**') }}

      - name: Init NCS v3.3.0 workspace
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        working-directory: workspace
        run: |
          git config --global --add safe.directory '*'
          west init -l nordic-wifi-shell-sqspi
          # Disable groups for optional external repos that fail SHA fetches in CI
          # and are not needed for the wifi-shell build.
          # Use west config instead of --group-filter flag: values starting with '-'
          # are misinterpreted by argparse as new flags even with separate invocations.
          west config manifest.group-filter -- -ci-skip,-benchmark
          west update -o=--depth=1 -n

      # When restoring from cache, repos are present but .west/ is absent.
      # Use the same west update flags as cache miss (-o=--depth=1 -n with group filter)
      # so that ci-skip transitive projects (e.g. matter) are excluded and repos
      # already at the right revision are checked out quickly without re-fetching.
      - name: Restore west config after cache hit
        if: steps.cache-ncs.outputs.cache-hit == 'true'
        working-directory: workspace
        run: |
          git config --global --add safe.directory '*'
          west init -l nordic-wifi-shell-sqspi 2>/dev/null || true
          west config manifest.group-filter -- -ci-skip,-benchmark
          west update -o=--depth=1 -n

      # Apply patches to nrfxlib, nrf, and zephyr on top of their v3.3.0 tags.
      # Skips gracefully if a patch is already applied (cache hit scenario).
      - name: Apply upstream patches
        working-directory: workspace
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"
          git config --global --add safe.directory '*'
          PATCHES="$(pwd)/nordic-wifi-shell-sqspi/patches"

          apply_patch() {
            local repo="$1"
            local patch="$2"
            echo "Applying patch to $repo..."
            if git -C "$repo" am "$patch" 2>&1; then
              echo "Patch applied to $repo"
            else
              git -C "$repo" am --abort 2>/dev/null || true
              # Extract subject: unfold RFC 2822 multi-line Subject, strip [PATCH*] and [nrf *] tags.
              # A wrapped Subject has continuation lines starting with whitespace.
              local subject
              subject=$(awk '
                /^Subject:/ {
                  sub(/^Subject: /, "")
                  sub(/^\[PATCH[^]]*\] /, "")
                  sub(/^\[nrf [^]]*\] /, "")
                  line = $0
                  while ((getline cont) > 0 && cont ~ /^ /) { line = line cont }
                  print line
                  exit
                }
              ' "$patch")
              if [ -n "$subject" ] && git -C "$repo" log --oneline | grep -qF "$subject"; then
                echo "Patch already applied to $repo — skipping"
              else
                echo "ERROR: patch failed for $repo and is not already applied"
                git -C "$repo" log --oneline -3
                exit 1
              fi
            fi
          }

          apply_patch nrfxlib "$PATCHES/nrfxlib/"0001-*.patch
          apply_patch nrf     "$PATCHES/nrf/"0001-*.patch
          apply_patch zephyr  "$PATCHES/zephyr/"0001-*.patch
          apply_patch zephyr  "$PATCHES/zephyr/"0002-*.patch

      - name: Build
        working-directory: workspace/nordic-wifi-shell-sqspi
        run: |
          west build \
            -b nrf54lm20dk/nrf54lm20a/cpuapp \
            -p \
            -d build \
            . \
            -- -DSHIELD=nrf7002eb2_mspi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          HEX="workspace/nordic-wifi-shell-sqspi/build/merged.hex"
          if [ ! -f "$HEX" ]; then
            HEX="workspace/nordic-wifi-shell-sqspi/build/nordic-wifi-shell-sqspi/zephyr/zephyr.hex"
          fi
          if [ ! -f "$HEX" ]; then
            HEX="workspace/nordic-wifi-shell-sqspi/build/zephyr/zephyr.hex"
          fi
          cp "$HEX" artifacts/nordic-wifi-shell-sqspi-nrf54lm20dk-nrf7002ebii-ncs3.3.0.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-nrf54lm20dk-sqspi
          path: artifacts/
          retention-days: 30

      # On every push to main: update the rolling "latest" release with fresh firmware.
      # softprops/action-gh-release creates the tag+release if absent, updates it if present.
      # Remove stale merged.hex asset first (may exist from earlier releases).
      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: false
          make_latest: true
          files: artifacts/nordic-wifi-shell-sqspi-nrf54lm20dk-nrf7002ebii-ncs3.3.0.hex
          body: |
            ## nRF54LM20DK + nRF7002 EB-II (sQSPI) — Latest pre-built firmware

            Auto-updated on every push to `main`.
            **Commit:** `${{ github.sha }}`

            ---

            For flashing and setup instructions, see the **[Evaluator Quick Start](https://github.com/chshzh/nordic-wifi-shell-sqspi#evaluator-quick-start)** in the README.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove stale merged.hex from release
        if: github.ref == 'refs/heads/main'
        # curl is not available in the NCS toolchain container — use python3 urllib instead.
        run: |
          python3 -c "
          import os, json, urllib.request as ul
          tok = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          req = ul.Request(
              'https://api.github.com/repos/' + repo + '/releases/tags/latest',
              headers={'Authorization': 'token ' + tok, 'Accept': 'application/vnd.github+json'})
          rel = json.loads(ul.urlopen(req).read())
          stale = [a for a in rel.get('assets', []) if a['name'] == 'merged.hex']
          if stale:
              ul.urlopen(ul.Request(
                  'https://api.github.com/repos/' + repo + '/releases/assets/' + str(stale[0]['id']),
                  method='DELETE',
                  headers={'Authorization': 'token ' + tok, 'Accept': 'application/vnd.github+json'}))
              print('Deleted stale merged.hex (id=' + str(stale[0]['id']) + ')')
          else:
              print('merged.hex not in release assets — nothing to delete')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
