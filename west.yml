manifest:
  version: "0.10"

  # Use sdk-nrf as the manifest source; import pulls in all NCS dependencies
  # (zephyr, nrfxlib, modules, bootloader, etc.).
  projects:
    - name: nrf
      url: https://github.com/nrfconnect/sdk-nrf
      revision: v3.3.0
      import: true

  # Tell west that this app lives at nordic-wifi-shell-sqspi/ in the workspace.
  self:
    path: nordic-wifi-shell-sqspi
