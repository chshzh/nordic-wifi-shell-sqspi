manifest:
  version: "0.10"

  # Use sdk-nrf as the manifest source; import pulls in all NCS dependencies
  # (zephyr, nrfxlib, modules, bootloader, etc.).
  #
  # zephyr and nrfxlib are listed explicitly here so CI can patch them
  # after a full 'west update'. west-commands is required for west to
  # register the 'west build' extension from zephyr.
  projects:
    - name: nrf
      url: https://github.com/nrfconnect/sdk-nrf
      revision: v3.3.0
      import: true

    - name: zephyr
      url: https://github.com/nrfconnect/sdk-zephyr
      revision: ncs-v3.3.0
      path: zephyr
      west-commands: scripts/west-commands.yml

    - name: nrfxlib
      url: https://github.com/nrfconnect/sdk-nrfxlib
      revision: v3.3.0
      path: nrfxlib

  # Tell west that this app lives at nordic-wifi-shell-sqspi/ in the workspace.
  self:
    path: nordic-wifi-shell-sqspi
