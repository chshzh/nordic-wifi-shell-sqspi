# Wi-Fi credentials storage (ZMS-backed settings)
CONFIG_WIFI_CREDENTIALS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y

# Increase log buffer for MSPI bus debug output
CONFIG_LOG_BUFFER_SIZE=8192

# Use random MAC address (OTP MAC is FF:FF:FF:FF:FF:FF on dev boards)
CONFIG_WIFI_RANDOM_MAC_ADDRESS=y
